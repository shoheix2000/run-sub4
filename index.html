// 取込データを既存記録にマージ（メモ・種別は既存を優先、数値・ラップを更新）
function mergeImport(base) {
  let changed = false;
  const next = [...base];
  for (const imp of FIT_IMPORT) {
    const byId = next.findIndex((r) => r.id === imp.id);
    if (byId >= 0) {
      const cur = next[byId];
      if (cur.distance !== imp.distance || cur.duration !== imp.duration || cur.avgHr !== imp.avgHr || cur.maxHr !== imp.maxHr) {
        next[byId] = { ...cur, distance: imp.distance, duration: imp.duration, pace: imp.pace, avgHr: imp.avgHr, maxHr: imp.maxHr, laps: imp.laps };
        changed = true;
      }
      continue;
    }
    const byDate = next.findIndex((r) => r.date === imp.date &&
      (Math.abs(r.distance - imp.distance) < 0.6 || (r.memo || "").includes("推定")));
    if (byDate >= 0) {
      const cur = next[byDate];
      const bigDiff = Math.abs(cur.distance - imp.distance) >= 2;
      next[byDate] = {
        ...cur,
        type: bigDiff ? imp.type : cur.type,
        distance: imp.distance, duration: imp.duration, pace: imp.pace,
        avgHr: imp.avgHr ?? cur.avgHr, maxHr: imp.maxHr ?? cur.maxHr, laps: imp.laps,
      };
      changed = true;
    } else {
      next.push({ ...imp });
      changed = true;
    }
  }
  if (changed) next.sort((a, b) => a.date.localeCompare(b.date));
  return { next, changed };
}

// 過去チャットの分析コメントをメモに追記（未追記の記録のみ）
function applyAdvice(base) {
  let changed = false;
  const next = base.map((r) => {
    const adv = ADVICE_IMPORT[r.date];
    if (adv && !(r.memo || "").includes(adv.slice(0, 20))) {
      changed = true;
      return { ...r, memo: r.memo ? r.memo + "\n\n" + adv : adv };
    }
    return r;
  });
  return { next, changed };
}

// ---- COROSラップ表（縦並び形式）のパーサー ----
function parseLapTable(text) {
  const lines = text.split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
  const laps = [];
  for (let i = 0; i < lines.length; i++) {
    const dm = lines[i].match(/^(\d+(?:\.\d+)?)\s*km$/);
    if (!dm) continue;
    const tm = (lines[i + 1] || "").match(/^(\d{1,2}):(\d{2}):(\d{2})$/);
    const pm = (lines[i + 2] || "").match(/^(\d{1,2})['’](\d{2})["”]?\s*\/km$/);
    if (!tm || !pm) continue;
    const hr = /^\d{2,3}$/.test(lines[i + 3] || "") ? +lines[i + 3] : null;
    laps.push({ dist: parseFloat(dm[1]), sec: +tm[1] * 3600 + +tm[2] * 60 + +tm[3], pace: +pm[1] * 60 + +pm[2], hr });
    i += 3;
  }
  if (laps.length === 0) return null;
  const distance = laps.reduce((s, l) => s + l.dist, 0);
  const duration = laps.reduce((s, l) => s + l.sec, 0);
  const hrLaps = laps.filter((l) => l.hr);
  const avgHr = hrLaps.length
    ? Math.round(hrLaps.reduce((s, l) => s + l.hr * l.dist, 0) / hrLaps.reduce((s, l) => s + l.dist, 0))
    : null;
  const maxHr = hrLaps.length ? Math.max(...hrLaps.map((l) => l.hr)) : null;
  return { distance: +distance.toFixed(2), duration, avgHr, maxHr, laps };
}

function parseFreeText(text) {
  const r = {};
  let m = text.match(/(\d+(?:\.\d+)?)\s*(?:km|キロ|㎞)/i);
  if (m) r.distance = parseFloat(m[1]);
  m = text.match(/(\d{1,2}):(\d{2}):(\d{2})/);
  if (m) r.duration = +m[1] * 3600 + +m[2] * 60 + +m[3];
  m = text.match(/(?:ペース|pace)[^\d]{0,10}(\d{1,2})[:'’](\d{2})/i);
  if (m) r.pace = +m[1] * 60 + +m[2];
  m = text.match(/(?:平均心拍|心拍|HR)[^\d]{0,10}(\d{2,3})/i);
  if (m) r.avgHr = +m[1];
  return r;
}

function parseMeta(text) {
  const r = {};
  let m = text.match(/(\d{4})[\/年.\-](\d{1,2})[\/月.\-](\d{1,2})/);
  if (m) r.date = `${m[1]}-${pad(m[2])}-${pad(m[3])}`;
  else {
    m = text.match(/(\d{1,2})\/(\d{1,2})/) || text.match(/(\d{1,2})月(\d{1,2})日/);
    if (m) r.date = `${new Date().getFullYear()}-${pad(m[1])}-${pad(m[2])}`;
  }
  for (const t of RUN_TYPES) if (text.includes(t)) { r.type = t; break; }
  if (!r.type) {
    if (/リカバリー|回復/.test(text)) r.type = "リカバリー走";
    else if (/ビルドアップ/.test(text)) r.type = "ビルドアップ走";
    else if (/ロング|LSD/.test(text)) r.type = "ロング走";
  }
  m = text.match(/気温\s*(\d{1,2})\s*度/);
  if (m) r.temp = +m[1];
  return r;
}

  const daysToRace = race.date ? Math.ceil((new Date(race.date + "T00:00:00") - new Date()) / 86400000) : null;

  const Stat = ({ label, value, sub }) => (
    <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 10, padding: "12px 16px", flex: 1, minWidth: 120 }}>
      <div style={{ fontSize: 13, color: C.sub, letterSpacing: 1 }}>{label}</div>
      <div style={{ fontSize: 28, fontWeight: 700, fontVariantNumeric: "tabular-nums", color: C.ink }}>{value}</div>
      {sub && <div style={{ fontSize: 13, color: C.sub }}>{sub}</div>}
    </div>
  );

  const exportJson = () => {
    const blob = new Blob([JSON.stringify(runs, null, 1)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `runlog-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
  };
  const importRef = useRef(null);
  const importJson = (file) => {
    const rd = new FileReader();
    rd.onload = () => {
      try {
        const data = JSON.parse(rd.result);
        if (!Array.isArray(data)) throw new Error();
        if (window.confirm(`${data.length}件のデータで置き換えます。よろしいですか？`)) save(migrate(data));
      } catch { setMsg("JSONの読み込みに失敗しました"); setTimeout(() => setMsg(""), 3000); }
    };
    rd.readAsText(file);
  };
  const setApiKey = () => {
    const cur = localStorage.getItem("runlog-api-key") || "";
    const k = window.prompt("Claude APIキー（AI分析・画像解析用。空欄で削除）", cur);
    if (k === null) return;
    if (k) localStorage.setItem("runlog-api-key", k.trim());
    else localStorage.removeItem("runlog-api-key");
    setMsg(k ? "APIキーを保存しました（この端末のみ）" : "APIキーを削除しました");
    setTimeout(() => setMsg(""), 3000);
  };

  if (loading) return <div style={{ padding: 40, fontFamily: "sans-serif", color: C.sub }}>読み込み中…</div>;

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.ink, fontFamily: "'Helvetica Neue', 'Hiragino Kaku Gothic ProN', sans-serif" }}>
      <header style={{ background: "#004C87", color: "#FFFFFF", padding: "18px 20px" }}>
        <div style={{ maxWidth: 900, margin: "0 auto", display: "flex", alignItems: "baseline", gap: 14, flexWrap: "wrap" }}>
          <h1 style={{ margin: 0, fontSize: 22, fontWeight: 800, letterSpacing: 2 }}>
            RUN LOG <span style={{ color: C.accent }}>/</span> SUB-4
          </h1>
          <span onClick={editRace} title="クリックしてレース名・開催日を変更"
            style={{ fontSize: 14, opacity: 0.85, cursor: "pointer" }}>
            {race.name && race.date
              ? `${race.name}（${+race.date.slice(5, 7)}/${+race.date.slice(8, 10)}）まで ${daysToRace > 0 ? `${daysToRace}日` : "—"} ✎`
              : "レース未設定（ここをクリックして入力）✎"}
            {" ・ 目標 3:50（Mペース 5'27\"/km）"}
          </span>
          <span style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
            <button onClick={exportJson} style={hdrBtn}>書き出し</button>
            <button onClick={() => importRef.current?.click()} style={hdrBtn}>読み込み</button>
            <button onClick={setApiKey} style={hdrBtn}>APIキー</button>
            <input ref={importRef} type="file" accept="application/json" style={{ display: "none" }}
              onChange={(e) => { if (e.target.files?.[0]) importJson(e.target.files[0]); e.target.value = ""; }} />
          </span>
        </div>
      </header>

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "16px 16px 60px" }}>
        {/* 月間・年間距離 */}
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 16 }}>
          <Stat label={`月間走行距離（${calY}年${calM + 1}月）`} value={`${monthKm.toFixed(1)} km`} />
          <Stat label={`年間走行距離（${calY}年）`} value={`${yearKm.toFixed(1)} km`} />
        </div>

        <div style={{ display: "flex", gap: 4, marginBottom: 16, borderBottom: `2px solid ${C.line}` }}>
          {[["cal", "記録カレンダー"], ["chart", "グラフ比較"], ["input", editId ? "記録を編集" : "記録を追加"]].map(([k, label]) => (
            <button key={k} onClick={() => setTab(k)}
              style={{
                padding: "10px 18px", border: "none", cursor: "pointer", fontSize: 16, fontWeight: 600,
                background: "transparent", color: tab === k ? C.accent : C.sub,
                borderBottom: tab === k ? `3px solid ${C.accent}` : "3px solid transparent", marginBottom: -2,
              }}>{label}</button>
          ))}
        </div>

        {msg && <div style={{ background: C.accentSoft, color: C.accent, padding: "8px 14px", borderRadius: 8, marginBottom: 12, fontSize: 15 }}>{msg}</div>}

        {/* ---- カレンダー ---- */}
        {tab === "cal" && (
          <div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 16, marginBottom: 10 }}>
              <button onClick={() => moveMonth(-1)} style={navBtn}>◀ 前月</button>
              <div style={{ fontSize: 20, fontWeight: 800, letterSpacing: 1 }}>{calY}年 {calM + 1}月</div>
              <button onClick={() => moveMonth(1)} style={navBtn}>翌月 ▶</button>
            </div>

            <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 10, overflow: "hidden" }}>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)" }}>
                {WEEKDAYS.map((w, i) => (
                  <div key={w} style={{
                    padding: "6px 0", textAlign: "center", fontSize: 14, fontWeight: 700,
                    color: i === 0 ? "#D64550" : i === 6 ? "#3D6FA0" : C.sub,
                    borderBottom: `1px solid ${C.line}`, background: C.bg,
                  }}>{w}</div>
                ))}
                {calCells.map((d, i) => {
                  const key = ymd(d);
                  const inMonth = d.getMonth() === calM;
                  const dayRuns = runsByDate.get(key) || [];
                  const ran = dayRuns.length > 0;
                  const km = dayRuns.reduce((s, r) => s + r.distance, 0);
                  const isSel = selDate === key;
                  const isToday = key === ymd(today);
                  return (
                    <div key={i}
                      onClick={() => ran && setSelDate(isSel ? null : key)}
                      style={{
                        minHeight: 72, padding: "4px 4px 6px", boxSizing: "border-box",
                        borderBottom: `1px solid ${C.line}`,
                        borderRight: (i % 7) < 6 ? `1px solid ${C.line}` : "none",
                        background: isSel ? C.accentSoft : inMonth ? "#FFFFFF" : "#F5F8FB",
                        cursor: ran ? "pointer" : "default",
                        opacity: inMonth ? 1 : 0.45,
                      }}>
                      <div style={{
                        width: 24, height: 24, lineHeight: "22px", textAlign: "center",
                        fontSize: 14, fontWeight: 700, fontVariantNumeric: "tabular-nums",
                        borderRadius: "50%",
                        border: ran ? `2px solid ${C.accent}` : isToday ? `1px dashed ${C.sub}` : "2px solid transparent",
                        color: ran ? C.accent : d.getDay() === 0 ? "#D64550" : d.getDay() === 6 ? "#3D6FA0" : C.ink,
                        background: ran ? "#FFFFFF" : "transparent",
                        boxSizing: "border-box",
                      }}>{d.getDate()}</div>
                      {ran && (
                        <div style={{ marginTop: 3, textAlign: "center" }}>
                          <div style={{ fontSize: 14, fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{km.toFixed(km >= 10 ? 0 : 1)}km</div>
                          <div style={{ fontSize: 12, color: C.sub, lineHeight: 1.2 }}>
                            {[...new Set(dayRuns.map((r) => r.type))].join("・")}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* 選択日の詳細（分析コメント） */}
            {selDate && selRuns.length > 0 && (
              <div style={{ marginTop: 16 }}>
                <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 8, color: C.accent }}>
                  {+selDate.slice(5, 7)}月{+selDate.slice(8, 10)}日の記録
                </div>
                {selRuns.map((r) => {
                  const diff = Math.round(r.pace - SUB4_PACE_SEC);
                  return (
                    <div key={r.id} style={{ background: C.card, border: `1px solid ${C.line}`, borderLeft: `4px solid ${C.accent}`, borderRadius: 10, padding: "14px 16px", marginBottom: 10 }}>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: "6px 16px", alignItems: "baseline", marginBottom: 6 }}>
                        <span style={{ fontSize: 15, fontWeight: 700, background: C.bg, border: `1px solid ${C.line}`, borderRadius: 6, padding: "2px 10px" }}>{r.type}</span>
                        <span style={{ fontVariantNumeric: "tabular-nums", fontWeight: 700 }}>{r.distance.toFixed(2)} km</span>
                        <span style={{ fontVariantNumeric: "tabular-nums" }}>{fmtDur(r.duration)}</span>
                        <span style={{ fontVariantNumeric: "tabular-nums", fontWeight: 700 }}>{fmtPace(r.pace)}/km</span>
                        <span style={{ fontSize: 14, fontWeight: 700, color: diff <= 0 ? C.ok : C.sub }}>
                          {diff <= 0 ? `サブ4比 ▲${Math.abs(diff)}秒` : `サブ4比 ＋${diff}秒`}
                        </span>
                        {r.avgHr && <span style={{ fontSize: 14, color: C.sub }}>♥ 平均{r.avgHr}{r.maxHr ? ` / 最大${r.maxHr}` : ""}</span>}
                        <span style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
                          <button onClick={() => aiAnalyze(r)} disabled={aiBusyId === r.id}
                            style={{ ...miniBtn, color: C.ok, fontWeight: 700 }}>
                            {aiBusyId === r.id ? "分析中…" : "AI分析"}
                          </button>
                          <button onClick={() => edit(r)} style={miniBtn}>編集</button>
                          <button onClick={() => remove(r.id)} style={{ ...miniBtn, color: C.accent }}>削除</button>
                        </span>
                      </div>
                      {r.memo ? (
                        <div style={{ fontSize: 15, lineHeight: 1.7, whiteSpace: "pre-wrap", borderTop: `1px dashed ${C.line}`, paddingTop: 8 }}>
                          <span style={{ fontSize: 13, fontWeight: 700, color: C.sub, display: "block", marginBottom: 2 }}>分析コメント</span>
                          {r.memo}
                        </div>
                      ) : (
                        <div style={{ fontSize: 14, color: C.sub }}>分析コメントは未登録です（編集から追加できます）</div>
                      )}
                      {r.laps && (
                        <div style={{ marginTop: 8, overflowX: "auto" }}>
                          <table style={{ fontSize: 14, borderCollapse: "collapse", fontVariantNumeric: "tabular-nums" }}>
                            <thead><tr style={{ color: C.sub }}><th style={th}>#</th><th style={th}>距離</th><th style={th}>ペース</th><th style={th}>心拍</th></tr></thead>
                            <tbody>
                              {r.laps.map((l, i) => (
                                <tr key={i}>
                                  <td style={td}>{i + 1}</td>
                                  <td style={td}>{l.dist.toFixed(2)}km</td>
                                  <td style={{ ...td, fontWeight: l.pace <= M_PACE_SEC ? 700 : 400, color: l.pace <= M_PACE_SEC ? C.ok : C.ink }}>{fmtPace(l.pace)}</td>
                                  <td style={td}>{l.hr ?? "–"}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
            {!selDate && (
              <div style={{ marginTop: 12, fontSize: 14, color: C.sub, textAlign: "center" }}>
                ○のついた日付をクリックすると、分析コメントを表示します
              </div>
            )}
          </div>
        )}

        {/* ---- 入力 ---- */}
        {tab === "input" && (
          <div style={{ display: "grid", gap: 14 }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 14 }}>
              {/* テキスト貼り付け */}
              <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 10, padding: 16 }}>
                <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 8 }}>①-A テキストを貼り付け</div>
                <div style={{ fontSize: 14, color: C.sub, marginBottom: 8 }}>
                  COROSのラップ表（ラップ／距離／時間／平均ペース／平均心拍数…の縦並び）に対応。日付や気温を含む説明文も一緒に貼ると自動反映されます。
                </div>
                <textarea value={paste} onChange={(e) => setPaste(e.target.value)}
                  placeholder={"例：\n7/4(土) ロング走 気温23度\nラップ\n距離\n時間\n平均ペース\n平均心拍数\n…\n1\n1.00km\n00:05:54\n05'54\"/km\n137\n…"}
                  style={{ width: "100%", minHeight: 140, border: `1px solid ${C.line}`, borderRadius: 8, padding: 10, fontSize: 15, fontFamily: "monospace", boxSizing: "border-box", resize: "vertical", background: "#FFFFFF", color: "#1A2B3C" }} />
                <button onClick={applyPaste}
                  style={{ marginTop: 8, background: "#004C87", color: "#FFFFFF", border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
                  解析してフォームに反映
                </button>
              </div>

              {/* スクリーンショット貼り付け */}
              <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 10, padding: 16 }}
                onPaste={(e) => {
                  const item = [...(e.clipboardData?.items || [])].find((it) => it.type.startsWith("image/"));
                  if (item) analyzeImage(item.getAsFile());
                }}>
                <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 8 }}>①-B スクリーンショットを貼り付け</div>
                <div style={{ fontSize: 14, color: C.sub, marginBottom: 8 }}>
                  COROSアプリの画面キャプチャをここに貼り付け（Ctrl+V）するか、ファイルを選択してください。AIが距離・タイム・心拍を読み取ります。
                </div>
                <div
                  onClick={() => fileRef.current?.click()}
                  style={{
                    border: `2px dashed ${C.line}`, borderRadius: 8, minHeight: 120,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    cursor: "pointer", fontSize: 15, color: C.sub, padding: 10,
                    background: imgPreview ? "#fff" : C.bg,
                  }}>
                  {imgBusy ? "解析中…" : imgPreview
                    ? <img src={imgPreview} alt="スクリーンショット" style={{ maxHeight: 160, maxWidth: "100%", borderRadius: 6 }} />
                    : "ここをクリックして画像を選択（または Ctrl+V で貼り付け）"}
                </div>
                <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }}
                  onChange={(e) => { if (e.target.files?.[0]) analyzeImage(e.target.files[0]); e.target.value = ""; }} />
              </div>
            </div>

            {/* 確認・保存フォーム */}
            <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 10, padding: 16 }}>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 10 }}>② 内容を確認・修正して保存</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 10 }}>
                <label style={{ fontSize: 14, color: C.sub }}>日付
                  <input type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} style={inp} /></label>
                <label style={{ fontSize: 14, color: C.sub }}>種別
                  <select value={form.type} onChange={(e) => setForm({ ...form, type: e.target.value })} style={inp}>
                    {RUN_TYPES.map((t) => <option key={t}>{t}</option>)}
                  </select></label>
                <label style={{ fontSize: 14, color: C.sub }}>距離 (km)
                  <input value={form.distance} onChange={(e) => setForm({ ...form, distance: e.target.value })} placeholder="10.0" style={inp} /></label>
                <label style={{ fontSize: 14, color: C.sub }}>タイム (h:mm:ss / mm:ss)
                  <input value={form.duration} onChange={(e) => setForm({ ...form, duration: e.target.value })} placeholder="58:32" style={inp} /></label>
                <label style={{ fontSize: 14, color: C.sub }}>平均心拍
                  <input value={form.avgHr} onChange={(e) => setForm({ ...form, avgHr: e.target.value })} placeholder="152" style={inp} /></label>
                <label style={{ fontSize: 14, color: C.sub }}>最大心拍
                  <input value={form.maxHr} onChange={(e) => setForm({ ...form, maxHr: e.target.value })} placeholder="171" style={inp} /></label>
              </div>
              {pendingLaps && (
                <div style={{ marginTop: 10, fontSize: 14, color: C.ok }}>✓ ラップ{pendingLaps.length}本を記録に添付します</div>
              )}
              <label style={{ fontSize: 14, color: C.sub, display: "block", marginTop: 10 }}>分析コメント・メモ
                <textarea value={form.memo} onChange={(e) => setForm({ ...form, memo: e.target.value })}
                  style={{ ...inp, minHeight: 80, resize: "vertical", fontFamily: "inherit" }} /></label>
              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <button onClick={submit}
                  style={{ background: C.accent, color: "#fff", border: "none", borderRadius: 8, padding: "10px 22px", fontSize: 16, fontWeight: 700, cursor: "pointer" }}>
                  {editId ? "更新する" : "保存する"}
                </button>
                {editId && (
                  <button onClick={() => { setEditId(null); setForm(emptyForm()); setPendingLaps(null); setImgPreview(null); }}
                    style={{ background: "transparent", color: C.sub, border: `1px solid ${C.line}`, borderRadius: 8, padding: "10px 16px", fontSize: 15, cursor: "pointer" }}>
                    キャンセル
                  </button>
                )}
              </div>
            </div>
          </div>
        )}

        {/* ---- グラフ ---- */}
        {tab === "chart" && (
          <div style={{ display: "grid", gap: 20 }}>
            <div style={{ display: "flex", gap: 6, justifyContent: "center" }}>
              {[["week", "週間"], ["month", "月間"], ["year", "年間"]].map(([k, label]) => (
                <button key={k} onClick={() => setPeriod(k)}
                  style={{
                    padding: "6px 18px", borderRadius: 20, fontSize: 15, fontWeight: 700, cursor: "pointer",
                    border: `1px solid ${period === k ? C.accent : C.line}`,
                    background: period === k ? C.accent : "#FFFFFF",
                    color: period === k ? "#fff" : C.sub,
                  }}>{label}</button>
              ))}
            </div>
            <ChartCard title={`平均ペースの推移（${period === "week" ? "週" : period === "month" ? "月" : "年"}ごとの距離加重平均・上ほど速い）`}>
              <ResponsiveContainer width="100%" height={260}>
                <LineChart data={chartData} margin={{ top: 10, right: 16, left: 0, bottom: 0 }}>
                  <CartesianGrid stroke={C.line} strokeDasharray="3 3" />
                  <XAxis dataKey="d" fontSize={13} />
                  <YAxis tickFormatter={fmtPace} fontSize={13} domain={["dataMin - 20", "dataMax + 20"]} reversed />
                  <Tooltip formatter={(v) => [fmtPace(v) + "/km", "ペース"]} />
                  <ReferenceLine y={SUB4_PACE_SEC} stroke={C.accent} strokeDasharray="6 4"
                    label={{ value: "サブ4 5'41", fill: C.accent, fontSize: 13, position: "insideBottomRight" }} />
                  <ReferenceLine y={M_PACE_SEC} stroke={C.ok} strokeDasharray="6 4"
                    label={{ value: "Mペース 5'27", fill: C.ok, fontSize: 13, position: "insideTopRight" }} />
                  <Line type="monotone" dataKey="pace" stroke={C.ink} strokeWidth={2} dot={{ r: 3 }} />
                </LineChart>
              </ResponsiveContainer>
              <div style={{ fontSize: 13, color: C.sub, marginTop: 6 }}>
                ※ リカバリー走・ロング走も含む全記録。練習種別ごとの狙いペースが異なる点に注意
              </div>
            </ChartCard>

            <ChartCard title={`${period === "week" ? "週間" : period === "month" ? "月間" : "年間"}走行距離`}>
              <ResponsiveContainer width="100%" height={220}>
                <BarChart data={chartData} margin={{ top: 10, right: 16, left: 0, bottom: 0 }}>
                  <CartesianGrid stroke={C.line} strokeDasharray="3 3" />
                  <XAxis dataKey="d" fontSize={13} />
                  <YAxis fontSize={13} unit=" km" />
                  <Tooltip formatter={(v) => [v + " km", "距離"]} />
                  <Bar dataKey="dist" fill={C.accent} radius={[4, 4, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </ChartCard>

            <ChartCard title={`平均心拍の推移（${period === "week" ? "週" : period === "month" ? "月" : "年"}ごとの距離加重平均）`}>
              <ResponsiveContainer width="100%" height={220}>
                <LineChart data={chartData.filter((d) => d.hr)} margin={{ top: 10, right: 16, left: 0, bottom: 0 }}>
                  <CartesianGrid stroke={C.line} strokeDasharray="3 3" />
                  <XAxis dataKey="d" fontSize={13} />
                  <YAxis fontSize={13} domain={[120, "dataMax + 5"]} unit=" bpm" />
                  <Tooltip />
                  <ReferenceLine y={155} stroke="#B07A00" strokeDasharray="6 4"
                    label={{ value: "ロング走上限 155", fill: "#B07A00", fontSize: 13, position: "insideTopRight" }} />
                  <Line type="monotone" dataKey="hr" name="平均心拍" stroke="#B07A00" strokeWidth={2} dot={{ r: 3 }} />
                </LineChart>
              </ResponsiveContainer>
            </ChartCard>

            <ChartCard title={`走行回数（${period === "week" ? "週4回が目標" : period === "month" ? "月別" : "年別"}）`}>
              <ResponsiveContainer width="100%" height={220}>
                <BarChart data={chartData} margin={{ top: 10, right: 16, left: 0, bottom: 0 }}>
                  <CartesianGrid stroke={C.line} strokeDasharray="3 3" />
                  <XAxis dataKey="d" fontSize={13} />
                  <YAxis fontSize={13} unit=" 回" allowDecimals={false} />
                  <Tooltip formatter={(v) => [v + " 回", "回数"]} />
                  {period === "week" && <ReferenceLine y={4} stroke={C.ok} strokeDasharray="6 4" />}
                  <Bar dataKey="n" fill={C.ink} radius={[4, 4, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </ChartCard>
          </div>
        )}
      </div>
    </div>
  );
}

const inp = {
  width: "100%", boxSizing: "border-box", marginTop: 4, padding: "8px 10px",
  border: "1px solid #C9D9E8", borderRadius: 8, fontSize: 16, background: "#FFFFFF",
  fontVariantNumeric: "tabular-nums", color: "#1A2B3C",
};
const miniBtn = {
  background: "transparent", border: "1px solid #C9D9E8", borderRadius: 6,
  padding: "3px 10px", fontSize: 14, cursor: "pointer", color: "#5A7186",
};
